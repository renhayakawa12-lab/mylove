<script>
    const player = document.getElementById("bgMusic");

    const playlist = [
        "music/Pangarap Lang Kita - Parokya Ni Edgar feat. Hapee Sy  - Narrative V1.mp3",
"music/I'll Be (Official Music Video) - Edwin McCain.mp3",
"music/Mariah Carey - Always Be My Baby (Official Music Video).mp3",

        "music/Your Universe (Acoustic).mp3",
        "music/Libu-Libong Buwan (Uuwian) - Kyle Raphael (Official Music Video).mp3"
    ];

    let currentSong = 0;

    player.src = playlist[currentSong];

    // Starts after the first click anywhere
    document.addEventListener("click", function startMusic() {
        player.play();
    }, { once: true });

    // Automatically play the next song
    player.addEventListener("ended", function () {
        currentSong++;

        if (currentSong >= playlist.length) {
            currentSong = 0;
        }

        player.src = playlist[currentSong];
        player.play();
    });
    </script>
